<svg width="800" height="1520" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #1a1b26; }
    .titlebar { fill: #24283b; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .title { fill: #565f89; font-family: monospace; font-size: 12px; }
    .prompt { fill: #7aa2f7; font-family: monospace; font-size: 13px; }
    .command { fill: #c0caf5; font-family: monospace; font-size: 13px; }
    .output { fill: #a9b1d6; font-family: monospace; font-size: 13px; }
    .comment { fill: #565f89; font-family: monospace; font-size: 13px; }
    .string { fill: #9ece6a; font-family: monospace; font-size: 13px; }
    .keyword { fill: #bb9af7; font-family: monospace; font-size: 13px; }
    .section { fill: #ff9e64; font-family: monospace; font-size: 13px; font-weight: bold; }
    .key { fill: #7dcfff; font-family: monospace; font-size: 13px; }
    .value { fill: #c0caf5; font-family: monospace; font-size: 13px; }
    .info { fill: #7aa2f7; font-family: monospace; font-size: 13px; }
    .warn { fill: #e0af68; font-family: monospace; font-size: 13px; }
    .error { fill: #f7768e; font-family: monospace; font-size: 13px; }
    .debug { fill: #bb9af7; font-family: monospace; font-size: 13px; }
    .dim { fill: #565f89; font-family: monospace; font-size: 13px; }
    .json-key { fill: #7aa2f7; font-family: monospace; font-size: 13px; }
    .json-string { fill: #9ece6a; font-family: monospace; font-size: 13px; }
    .json-number { fill: #ff9e64; font-family: monospace; font-size: 13px; }
    .json-brace { fill: #c0caf5; font-family: monospace; font-size: 13px; }
    .link { fill: #7aa2f7; font-family: monospace; font-size: 13px; text-decoration: underline; }
    .white { fill: #c0caf5; font-family: monospace; font-size: 13px; }
    .green { fill: #9ece6a; font-family: monospace; font-size: 13px; }
    .yellow { fill: #e0af68; font-family: monospace; font-size: 13px; }
    .red { fill: #f7768e; font-family: monospace; font-size: 13px; }
    .cyan { fill: #7dcfff; font-family: monospace; font-size: 13px; }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="1520" rx="10" ry="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="800" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="20" width="800" height="16"/>
  <circle class="dot-red" cx="20" cy="18" r="6"/>
  <circle class="dot-yellow" cx="40" cy="18" r="6"/>
  <circle class="dot-green" cx="60" cy="18" r="6"/>
  <text class="title" x="370" y="22" text-anchor="middle">harry@production ~ </text>

  <!-- SSH login -->
  <text class="prompt" x="20" y="65">$</text>
  <text class="command" x="35" y="65">ssh harry@production</text>

  <text class="dim" x="20" y="90">Last login: Mon Mar 31 03:14:07 2026 from mass-caffeine-overdose</text>
  <text class="green" x="20" y="110">Welcome to HarryOS 2.1.0 LTS (GNU/Caffeinated)</text>
  <text class="output" x="20" y="135"> * Documentation:  </text><text class="link" x="175" y="135">https://harrylowkey.dev</text>
  <text class="output" x="20" y="155"> * Support:        lol good luck</text>
  <text class="output" x="20" y="175"> * System uptime:  5+ years (no downtime except that one time)</text>

  <!-- whoami -->
  <text class="prompt" x="20" y="210">$</text>
  <text class="command" x="35" y="210">whoami</text>

  <text class="white" x="20" y="240" font-weight="bold" font-size="15" font-family="monospace">Harry Dang</text>
  <text class="output" x="20" y="260">Backend Lead</text><text class="dim" x="120" y="260"> | </text><text class="output" x="135" y="260">Microservices Architect</text><text class="dim" x="320" y="260"> | </text><text class="cyan" x="335" y="260">CKAD Certified</text>
  <text class="dim" x="20" y="280">Locally sourced from Vietnam. Deployed globally.</text>

  <!-- cat skills.conf -->
  <text class="prompt" x="20" y="315">$</text>
  <text class="command" x="35" y="315">cat /etc/skills.conf</text>

  <text class="section" x="20" y="345">[core]</text>
  <text class="key" x="20" y="365">nodejs</text><text class="dim" x="160" y="365">=</text><text class="value" x="175" y="365">loaded</text>
  <text class="key" x="20" y="385">nestjs</text><text class="dim" x="160" y="385">=</text><text class="value" x="175" y="385">main character energy</text>
  <text class="key" x="20" y="405">typescript</text><text class="dim" x="160" y="405">=</text><text class="value" x="175" y="405">`any` is illegal here</text>
  <text class="key" x="20" y="425">docker</text><text class="dim" x="160" y="425">=</text><text class="value" x="175" y="425">if it breathes, it gets containerized</text>
  <text class="key" x="20" y="445">microservices</text><text class="dim" x="160" y="445">=</text><text class="value" x="175" y="445">broke up with monoliths in 2021</text>

  <text class="section" x="20" y="475">[infra]</text>
  <text class="key" x="20" y="495">kubernetes</text><text class="dim" x="160" y="495">=</text><text class="value" x="175" y="495">certified. the pods fear me.</text>
  <text class="key" x="20" y="515">cicd</text><text class="dim" x="160" y="515">=</text><text class="value" x="175" y="515">push to main. close laptop. leave building.</text>
  <text class="key" x="20" y="535">postgresql</text><text class="dim" x="160" y="535">=</text><text class="value" x="175" y="535">SELECT * FROM skills WHERE impressive = true</text>
  <text class="key" x="20" y="555">redis</text><text class="dim" x="160" y="555">=</text><text class="value" x="175" y="555">loaded</text>
  <text class="key" x="20" y="575">aws</text><text class="dim" x="160" y="575">=</text><text class="value" x="175" y="575">mostly bills</text>
  <text class="key" x="20" y="595">kafka</text><text class="dim" x="160" y="595">=</text><text class="value" x="175" y="595">streaming</text>
  <text class="key" x="20" y="615">rabbitmq</text><text class="dim" x="160" y="615">=</text><text class="value" x="175" y="615">queued</text>
  <text class="key" x="20" y="635">grpc</text><text class="dim" x="160" y="635">=</text><text class="value" x="175" y="635">my services talk more than I do</text>

  <text class="section" x="20" y="665">[experimental]</text>
  <text class="key" x="20" y="685">python</text><text class="dim" x="160" y="685">=</text><text class="value" x="175" y="685">learning the dark arts</text>
  <text class="key" x="20" y="705">fastapi</text><text class="dim" x="160" y="705">=</text><text class="value" x="175" y="705">in progress</text>

  <!-- docker ps -->
  <text class="prompt" x="20" y="745">$</text>
  <text class="command" x="35" y="745">docker ps</text>

  <text class="dim" x="20" y="775">CONTAINER ID   IMAGE                       STATUS         NAMES</text>
  <text class="yellow" x="20" y="795">a1b2c3d4e5f6</text><text class="cyan" x="135" y="795">   harrylowkey/superset</text><text class="green" x="370" y="795">   Up 69 days</text><text class="string" x="490" y="795">   "become ungovernable"</text>
  <text class="yellow" x="20" y="815">f6e5d4c3b2a1</text><text class="cyan" x="135" y="815">   harrylowkey/claude-plugins</text><text class="green" x="370" y="815">   Up 42 days</text><text class="string" x="490" y="815">   "batteries included"</text>
  <text class="yellow" x="20" y="835">b2c3d4e5f6a1</text><text class="cyan" x="135" y="835">   harrylowkey/whatIlearn</text><text class="green" x="370" y="835">   Up 365 days</text><text class="string" x="490" y="835">   "doctors hate him"</text>
  <text class="yellow" x="20" y="855">c3d4e5f6a1b2</text><text class="cyan" x="135" y="855">   harrylowkey/PyNest</text><text class="green" x="370" y="855">   Up 120 days</text><text class="string" x="490" y="855">   "NestJS + Python baby"</text>

  <!-- curl health -->
  <text class="prompt" x="20" y="895">$</text>
  <text class="command" x="35" y="895">curl -s localhost/health</text>

  <text class="json-brace" x="20" y="925">{</text>
  <text class="json-key" x="35" y="945">"status"</text><text class="json-brace" x="105" y="945">:</text><text class="json-string" x="120" y="945">"caffeinated"</text><text class="json-brace" x="230" y="945">,</text>
  <text class="json-key" x="35" y="965">"uptime"</text><text class="json-brace" x="105" y="965">:</text><text class="json-string" x="120" y="965">"5+ years"</text><text class="json-brace" x="210" y="965">,</text>
  <text class="json-key" x="35" y="985">"last_incident"</text><text class="json-brace" x="155" y="985">:</text><text class="json-string" x="170" y="985">"we don't talk about that"</text><text class="json-brace" x="405" y="985">,</text>
  <text class="json-key" x="35" y="1005">"bugs"</text><text class="json-brace" x="85" y="1005">:</text><text class="json-number" x="100" y="1005">0</text><text class="json-brace" x="110" y="1005">,</text>
  <text class="json-key" x="35" y="1025">"bugs_disclaimer"</text><text class="json-brace" x="175" y="1025">:</text><text class="json-string" x="190" y="1025">"this field may be lying"</text>
  <text class="json-brace" x="20" y="1045">}</text>

  <!-- reviews.log -->
  <text class="prompt" x="20" y="1085">$</text>
  <text class="command" x="35" y="1085">cat /var/log/reviews.log</text>

  <text class="dim" x="20" y="1115">[2026-03-15 02:14:33]</text><text class="info" x="190" y="1115"> INFO </text><text class="string" x="240" y="1115"> "Deployed his code. Nothing caught fire."</text><text class="dim" x="618" y="1115"> - relieved-pm</text>
  <text class="dim" x="20" y="1135">[2026-02-28 04:20:00]</text><text class="warn" x="190" y="1135"> WARN </text><text class="string" x="240" y="1135"> "Refactored our codebase overnight. Didn't ask."</text><text class="dim" x="640" y="1135"> - confused-cto</text>
  <text class="dim" x="20" y="1155">[2026-01-12 03:00:01]</text><text class="error" x="190" y="1155"> ERROR</text><text class="string" x="240" y="1155"> "Please stop force pushing to main."</text><text class="dim" x="570" y="1155"> - former-colleague</text>
  <text class="dim" x="20" y="1175">[2025-11-03 23:59:59]</text><text class="debug" x="190" y="1175"> DEBUG</text><text class="string" x="240" y="1175"> "Explained K8s for 45 min. Understood nothing."</text><text class="dim" x="640" y="1175"> - frontend-dev</text>

  <!-- motd warnings -->
  <text class="prompt" x="20" y="1215">$</text>
  <text class="command" x="35" y="1215">cat /etc/motd</text>

  <text class="error" x="20" y="1245">WARNING:</text><text class="output" x="100" y="1245"> May decompose your monolith into 47 microservices.</text>
  <text class="error" x="20" y="1265">IF SWALLOWED:</text><text class="output" x="130" y="1265"> kubectl rollout undo deployment/harry</text>
  <text class="error" x="20" y="1285">KEEP AWAY FROM:</text><text class="output" x="150" y="1285"> production databases without backups</text>

  <!-- links -->
  <text class="prompt" x="20" y="1325">$</text>
  <text class="command" x="35" y="1325">cat /etc/contact.conf</text>

  <text class="key" x="20" y="1355">web</text><text class="dim" x="80" y="1355">=</text><text class="link" x="95" y="1355">https://harrylowkey.dev</text>
  <text class="key" x="20" y="1375">instagram</text><text class="dim" x="100" y="1375">=</text><text class="link" x="115" y="1375">@coding.easily</text>

  <!-- closing -->
  <text class="prompt" x="20" y="1415">$</text>
  <text class="command" x="35" y="1415">exit</text>
  <text class="dim" x="20" y="1440">Connection to harry@production closed.</text>

  <!-- cursor blink -->
  <rect x="20" y="1460" width="8" height="16" fill="#c0caf5">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
